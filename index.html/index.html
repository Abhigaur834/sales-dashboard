<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QA.Hub V3 — Lead Conversion Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Outfit;
background:#07090d;
color:#e2e8f0;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:#0c0f16;
border-bottom:1px solid #1a2235;
}

.brand{
font-weight:700;
font-size:18px;
color:#f59e0b;
}

.main{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#101520;
border:1px solid #1a2235;
padding:15px;
border-radius:10px;
}

.kpi{
font-size:28px;
font-weight:700;
color:#f59e0b;
}

.chart{
height:260px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #1a2235;
text-align:left;
}

.ai{
background:#0c0f16;
border-left:4px solid #10b981;
padding:12px;
margin-bottom:10px;
border-radius:5px;
}

button{
background:#f59e0b;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="brand">QA.Hub V3</div>

<div>
<input type="file" id="upload">
</div>

</header>

<div class="main">

<div class="grid">

<div class="card">
Total Leads
<div class="kpi" id="total">0</div>
</div>

<div class="card">
Closed Sales
<div class="kpi" id="closed">0</div>
</div>

<div class="card">
Conversion Rate
<div class="kpi" id="rate">0%</div>
</div>

<div class="card">
Active Agents
<div class="kpi" id="agents">0</div>
</div>

</div>

<div class="card">
<h3>Daily Lead Volume</h3>
<canvas id="daily" class="chart"></canvas>
</div>

<div class="card">
<h3>Lead Source Performance</h3>
<canvas id="source" class="chart"></canvas>
</div>

<div class="card">
<h3>Lead Conversion Funnel</h3>
<canvas id="funnel" class="chart"></canvas>
</div>

<div class="card">

<h3>Agent Leaderboard</h3>

<table>
<thead>

<tr>
<th>Agent</th>
<th>Leads</th>
<th>Closed</th>
<th>Conversion %</th>
</tr>

</thead>

<tbody id="agentTable"></tbody>

</table>

</div>

<div class="card">

<h3>AI Sales Insights</h3>

<div id="insights"></div>

</div>

</div>

<script>

let DATA={
total:0,
closed:0,
source:{},
agents:{},
agentClosed:{},
dates:{},
stages:{}
}

document.getElementById("upload").addEventListener("change",handleFile)

function handleFile(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(evt){

let data=new Uint8Array(evt.target.result)

let workbook=XLSX.read(data,{type:'array'})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

processData(rows)

}

reader.readAsArrayBuffer(file)

}

function processData(rows){

DATA.total=rows.length

rows.forEach(r=>{

let src=r["Lead Source"]||"Unknown"
let agent=r["Agents Name"]||"Unknown"
let stage=r["Stage"]||"Unknown"
let date=r["Lead Created Time"]

DATA.source[src]=(DATA.source[src]||0)+1
DATA.agents[agent]=(DATA.agents[agent]||0)+1
DATA.stages[stage]=(DATA.stages[stage]||0)+1

if(stage==="Closed Sale"){

DATA.closed++

DATA.agentClosed[agent]=(DATA.agentClosed[agent]||0)+1

}

if(date){

let d=date.split(" ")[0]

DATA.dates[d]=(DATA.dates[d]||0)+1

}

})

render()

}

function render(){

document.getElementById("total").innerText=DATA.total
document.getElementById("closed").innerText=DATA.closed

let rate=(DATA.closed/DATA.total*100).toFixed(2)

document.getElementById("rate").innerText=rate+"%"

document.getElementById("agents").innerText=Object.keys(DATA.agents).length

renderDaily()
renderSource()
renderFunnel()
renderAgents()
renderAI()

}

function renderDaily(){

new Chart(document.getElementById("daily"),{

type:"line",

data:{
labels:Object.keys(DATA.dates),
datasets:[{
data:Object.values(DATA.dates),
borderColor:"#f59e0b"
}]
}

})

}

function renderSource(){

new Chart(document.getElementById("source"),{

type:"doughnut",

data:{
labels:Object.keys(DATA.source),
datasets:[{
data:Object.values(DATA.source)
}]
}

})

}

function renderFunnel(){

new Chart(document.getElementById("funnel"),{

type:"bar",

data:{
labels:Object.keys(DATA.stages),
datasets:[{
data:Object.values(DATA.stages),
backgroundColor:"#38bdf8"
}]
}

})

}

function renderAgents(){

let agents=Object.entries(DATA.agents).sort((a,b)=>b[1]-a[1]).slice(0,10)

let html=""

agents.forEach(a=>{

let closed=DATA.agentClosed[a[0]]||0

let rate=(closed/a[1]*100).toFixed(1)

html+=`
<tr>
<td>${a[0]}</td>
<td>${a[1]}</td>
<td>${closed}</td>
<td>${rate}%</td>
</tr>
`

})

document.getElementById("agentTable").innerHTML=html

}

function renderAI(){

let ins=[]

if(DATA.closed/DATA.total <0.05)
ins.push("⚠ Conversion rate below 5%")

let topSource=Object.entries(DATA.source).sort((a,b)=>b[1]-a[1])[0]

if(topSource)
ins.push("📈 "+topSource[0]+" generates most leads")

let topAgent=Object.entries(DATA.agentClosed).sort((a,b)=>b[1]-a[1])[0]

if(topAgent)
ins.push("🏆 "+topAgent[0]+" is top closer")

let html=""

ins.forEach(i=>{

html+=`<div class="ai">${i}</div>`

})

document.getElementById("insights").innerHTML=html

}

</script>

</body>
</html>
