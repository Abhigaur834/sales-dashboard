<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QA.Hub — Lead Conversion Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
background:#07090d;
font-family:Outfit;
color:#e2e8f0;
margin:0;
}

header{
padding:15px 25px;
background:#0c0f16;
border-bottom:1px solid #1a2235;
font-weight:700;
color:#f59e0b;
}

.main{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#101520;
border:1px solid #1a2235;
border-radius:10px;
padding:15px;
}

.kpi{
font-size:28px;
font-weight:700;
color:#f59e0b;
}

.chart{
height:260px;
}

</style>

</head>

<body>

<header>

QA.Hub — Lead Conversion Intelligence

</header>

<div class="main">

<div class="grid">

<div class="card">

Total Leads

<div class="kpi" id="total">0</div>

</div>

<div class="card">

Closed Sales

<div class="kpi" id="closed">0</div>

</div>

<div class="card">

Conversion Rate

<div class="kpi" id="rate">0%</div>

</div>

<div class="card">

Active Agents

<div class="kpi" id="agents">0</div>

</div>

</div>

<div class="card">

<h3>Lead Source Distribution</h3>

<canvas id="sourceChart" class="chart"></canvas>

</div>

<div class="card">

<h3>Stage Distribution</h3>

<canvas id="stageChart" class="chart"></canvas>

</div>

<div class="card">

<h3>Top Agents</h3>

<canvas id="agentChart" class="chart"></canvas>

</div>

</div>

<script>


const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

};


firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()


let leads=[]

async function loadData(){

const snapshot=await db.collection("leads").get()

snapshot.forEach(doc=>{

leads.push(doc.data())

})

renderDashboard()

}

function renderDashboard(){

let total=leads.length

let closed=leads.filter(l=>l.stage=="Closed Sale").length

let rate=(closed/total*100).toFixed(2)

let agents={}
let source={}
let stage={}

leads.forEach(l=>{

agents[l.agent]=(agents[l.agent]||0)+1

source[l.lead_source]=(source[l.lead_source]||0)+1

stage[l.stage]=(stage[l.stage]||0)+1

})

document.getElementById("total").innerText=total
document.getElementById("closed").innerText=closed
document.getElementById("rate").innerText=rate+"%"
document.getElementById("agents").innerText=Object.keys(agents).length


new Chart(document.getElementById("sourceChart"),{

type:"doughnut",

data:{

labels:Object.keys(source),

datasets:[{

data:Object.values(source)

}]

}

})


new Chart(document.getElementById("stageChart"),{

type:"bar",

data:{

labels:Object.keys(stage),

datasets:[{

data:Object.values(stage),

backgroundColor:"#38bdf8"

}]

}

})


let topAgents=Object.entries(agents).sort((a,b)=>b[1]-a[1]).slice(0,10)

new Chart(document.getElementById("agentChart"),{

type:"bar",

data:{

labels:topAgents.map(a=>a[0]),

datasets:[{

data:topAgents.map(a=>a[1]),

backgroundColor:"#f59e0b"

}]

}

})

}

loadData()

</script>

</body>

</html>
